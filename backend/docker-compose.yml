services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todotree}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todotree}
      POSTGRES_DB: ${POSTGRES_DB:-todotree}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todotree}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
